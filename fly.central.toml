# Fly.io — central 서버 설정
# 위치: 프로젝트 루트. 빌드 컨텍스트도 루트라 Dockerfile.central 바로 찾음.
#
# 첫 배포 전:
#   fly apps create durango-central                                # 앱 생성 (이름 중복이면 다른 이름)
#   fly volumes create central_data --region nrt --size 1 -a durango-central
# 배포:
#   fly deploy --config fly.central.toml --dockerfile Dockerfile.central
# 환경변수(zone 띄운 뒤 채움):
#   fly secrets set ZONE_HOSTS='{"korea":"durango-korea.fly.dev","japan":"durango-japan.fly.dev"}' -a durango-central

app = "durango-central-jm"
primary_region = "nrt"   # Tokyo — 한국에서 가장 가까운 Fly 리전

[env]
  PORT = "3010"
  DB_PATH = "/data/central.db"
  PUBLIC_HOST = "durango-central-jm.fly.dev"

[http_service]
  internal_port = 3010
  force_https = true
  auto_stop_machines = "off"     # central은 항상 깨어 있어야 — auth/marketplace
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "central_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

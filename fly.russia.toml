app = "durango-russia-jm"
primary_region = "nrt"

[env]
  ZONE_ID = "russia"
  PORT = "3001"
  DB_PATH = "/data/world-russia.db"
  LATENCY_MS = "0"
  WS_PROTO = "wss"
  HTTP_PROTO = "https"
  CENTRAL_PORT = "443"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "russia_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
